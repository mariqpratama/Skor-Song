<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Skor Song - Bento Grid</title>
    
    <!-- Dependencies via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/chart.js"></script>
    <script src="https://unpkg.com/lucide-react@0.469.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@11/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom scrollbar for history */
        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;
        const MotionModule = window.Motion || window.FramerMotion || { motion: ({children}) => <div>{children}</div>, AnimatePresence: ({children}) => <Fragment>{children}</Fragment> };
        const { motion, AnimatePresence } = MotionModule;
        
        // Robust icon component that looks up Lucide icons by name with fallbacks
        const Icon = ({ name, className, size = 16 }) => {
            const lib = window.LucideReact || window.lucide || window.Lucide || {};
            const icons = lib.icons || lib;
            
            const lookup = (n) => icons[n] || icons[n.charAt(0).toUpperCase() + n.slice(1)];
            
            let Component = lookup(name);
            
            // Fallbacks for common naming variations
            if (!Component) {
                if (name === 'Pencil') Component = lookup('Edit') || lookup('Edit3') || lookup('Edit2');
                if (name === 'Trash2') Component = lookup('Trash');
                if (name === 'History') Component = lookup('Clock') || lookup('RotateCcw');
            }
            
            if (!Component) {
                return <span className={className} style={{fontSize: size + 'px'}}>•</span>;
            }
            
            return <Component className={className} size={size} strokeWidth={2} />;
        };

        const DEFAULT_COLORS = [
            '#3b82f6', // p1: Blue
            '#ef4444', // p2: Red
            '#10b981', // p3: Green/Emerald
            '#f59e0b', // p4: Yellow/Amber
            '#8b5cf6'  // p5: Purple/Violet
        ];

        const RecapChart = ({ players, rounds }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartRef.current) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const labels = ['Awal', ...rounds.map((_, i) => `Ronde ${i + 1}`)];
                    
                    const datasets = players.map(player => {
                        let accumulated = 0;
                        const data = [0];
                        
                        rounds.forEach(round => {
                            accumulated += round.scores[player.id || 0] || 0;
                            data.push(accumulated);
                        });

                        return {
                            label: player.name,
                            data: data,
                            borderColor: player.color,
                            backgroundColor: player.color + '33',
                            tension: 0.3,
                            fill: false,
                            pointRadius: 5,
                            pointHoverRadius: 8
                        };
                    });

                    chartInstance.current = new Chart(chartRef.current, {
                        type: 'line',
                        data: { labels, datasets },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { 
                                    position: 'top', 
                                    labels: { font: { family: 'Inter', weight: 'bold', size: 10 } } 
                                },
                                tooltip: { mode: 'index', intersect: false }
                            },
                            scales: {
                                y: { 
                                    beginAtZero: true,
                                    grid: { color: '#e5e7eb' }
                                },
                                x: { 
                                    grid: { display: false }
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [players, rounds]);

            return (
                <div className="flex-1 relative pb-4 min-h-[250px]">
                    <canvas ref={chartRef}></canvas>
                </div>
            );
        };

        function App() {
            const [players, setPlayers] = useState([
                { id: 1, name: 'Pemain 1', color: DEFAULT_COLORS[0], totalScore: 0 },
                { id: 2, name: 'Pemain 2', color: DEFAULT_COLORS[1], totalScore: 0 },
                { id: 3, name: 'Pemain 3', color: DEFAULT_COLORS[2], totalScore: 0 },
                { id: 4, name: 'Pemain 4', color: DEFAULT_COLORS[3], totalScore: 0 },
                { id: 5, name: 'Pemain 5', color: DEFAULT_COLORS[4], totalScore: 0 },
            ]);

            const [rounds, setRounds] = useState([]);
            const [currentRoundInput, setCurrentRoundInput] = useState({
                1: '', 2: '', 3: '', 4: '', 5: ''
            });
            const [currentAsSekop, setCurrentAsSekop] = useState(null);
            const [isGameEnded, setIsGameEnded] = useState(false);

            const handlePlayerNameChange = (id, newName) => {
                setPlayers(prev => prev.map(p => p.id === id ? { ...p, name: newName } : p));
            };

            const handleScoreChange = (playerId, value) => {
                setCurrentRoundInput(prev => ({ ...prev, [playerId]: value }));
            };

            const saveRound = () => {
                if (currentAsSekop === null) {
                    alert('Pilih pemegang AS Sekop Hitam terlebih dahulu!');
                    return;
                }

                const allFilled = players.every(p => currentRoundInput[p.id] !== '');
                if (!allFilled) {
                    alert('Semua skor pemain harus diisi terlebih dahulu! (Isi 0 jika tidak ada poin)');
                    return;
                }

                const roundScores = {};
                const updatedPlayers = players.map(player => {
                    const baseScore = parseInt(currentRoundInput[player.id]) || 0;
                    const additional = player.id === currentAsSekop ? 15 : 0;
                    const finalRoundScore = baseScore + additional;
                    
                    roundScores[player.id] = finalRoundScore;
                    
                    return {
                        ...player,
                        totalScore: player.totalScore + finalRoundScore
                    };
                });

                const newRound = {
                    roundNumber: rounds.length + 1,
                    scores: roundScores,
                    asSekopPlayerId: currentAsSekop
                };

                setRounds([...rounds, newRound]);
                setPlayers(updatedPlayers);
                
                setCurrentRoundInput({ 1: '', 2: '', 3: '', 4: '', 5: '' });
                setCurrentAsSekop(null);
            };

            const startNewSession = () => {
                setRounds([]);
                setPlayers(prev => prev.map(p => ({ ...p, totalScore: 0 })));
                setIsGameEnded(false);
                setCurrentAsSekop(null);
                setCurrentRoundInput({ 1: '', 2: '', 3: '', 4: '', 5: '' });
            };

            const deleteRound = (index) => {
                const roundToDelete = rounds[index];
                const newRounds = rounds.filter((_, i) => i !== index);
                const updatedPlayers = players.map(player => ({
                    ...player,
                    totalScore: player.totalScore - roundToDelete.scores[player.id]
                }));
                setRounds(newRounds);
                setPlayers(updatedPlayers);
            };

            const sortedPlayers = [...players].sort((a, b) => b.totalScore - a.totalScore);

            const asSekopStats = (() => {
                if (rounds.length === 0) return null;
                const counts = rounds.reduce((acc, r) => {
                    if (r.asSekopPlayerId !== null) {
                        acc[r.asSekopPlayerId] = (acc[r.asSekopPlayerId] || 0) + 1;
                    }
                    return acc;
                }, {});

                let maxId = -1;
                let maxVal = 0;
                Object.entries(counts).forEach(([id, count]) => {
                    if (count > maxVal) {
                        maxVal = count;
                        maxId = Number(id);
                    }
                });

                const player = players.find(p => p.id === maxId);
                return player ? { name: player.name, count: maxVal } : null;
            })();

            return (
                <div className="min-h-screen bg-[#f8fafc] text-[#1e293b] font-sans selection:bg-slate-200">
                    <div className="max-w-7xl mx-auto p-3 md:p-6 grid grid-cols-1 md:grid-cols-12 gap-3 md:gap-4">
                        {/* Header */}
                        <header className="col-span-12 bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-4 md:px-6 md:py-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 shadow-sm">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 md:w-9 md:h-9 bg-[#3b82f6] rounded-lg shadow-sm shadow-blue-100 flex items-center justify-center text-white font-black text-sm md:text-base">S</div>
                                <h1 className="text-lg md:text-xl font-bold tracking-tight">Kalkulator Skor Song</h1>
                            </div>
                            <div className="flex items-center justify-between w-full sm:w-auto gap-4 pt-3 sm:pt-0 border-t border-slate-100 sm:border-0">
                                <div className="flex flex-col items-start sm:items-end">
                                    <span className="text-[9px] uppercase font-bold tracking-widest text-[#64748b]">Sesi Aktif</span>
                                    <span className="text-xs font-bold">Live Games</span>
                                </div>
                                {!isGameEnded ? (
                                    <button onClick={() => setIsGameEnded(true)} disabled={rounds.length === 0}
                                        className="px-4 py-2.5 border border-[#ef4444] text-[#ef4444] rounded-lg text-xs font-bold hover:bg-[#ef4444] hover:text-white transition-all disabled:opacity-50 min-h-[40px]">
                                        Akhiri Permainan
                                    </button>
                                ) : (
                                    <button onClick={startNewSession}
                                        className="px-4 py-2.5 bg-[#1e293b] text-white rounded-lg text-xs font-bold hover:bg-slate-700 transition-all min-h-[40px]">
                                        Mulai Sesi Baru
                                    </button>
                                )}
                            </div>
                        </header>

                        {/* Player Stats Row */}
                        <div className="col-span-12 grid grid-cols-2 lg:grid-cols-5 gap-2 md:gap-3">
                            {players.map((player, idx) => (
                                <div key={player.id} className={`bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-3 md:p-4 flex flex-col gap-1 transition-all shadow-sm ${idx === 4 ? 'col-span-2 lg:col-span-1' : ''}`} style={{ borderLeft: `4px solid ${player.color}` }}>
                                    <div className="flex items-center justify-between mb-0.5">
                                        <span className="text-[9px] uppercase font-bold tracking-widest text-[#64748b]">Pemain {player.id}</span>
                                        <div className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: player.color }}></div>
                                    </div>
                                    <div className="relative group/name">
                                        <input type="text" value={player.name} onChange={(e) => handlePlayerNameChange(player.id, e.target.value)}
                                            className="w-full border-none outline-none font-bold text-sm md:text-base bg-transparent p-0 pr-6 focus:text-[#3b82f6] transition-colors truncate"
                                            placeholder={`Pemain ${player.id}`} />
                                        <Icon name="Pencil" className="w-3.5 h-3.5 absolute right-0 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none" />
                                    </div>
                                    <div className="mt-0.5 font-mono text-xl md:text-2xl font-black tabular-nums" style={{ color: player.color }}>
                                        {player.totalScore}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <AnimatePresence mode="wait">
                            {!isGameEnded ? (
                                <motion.div key="game-active" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="col-span-12 grid grid-cols-1 md:grid-cols-12 gap-3 md:gap-4">
                                    {/* Input Section */}
                                    <section className="col-span-12 md:col-span-5 bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-4 md:p-6 flex flex-col shadow-sm">
                                        <div className="flex items-center justify-between mb-5">
                                            <h2 className="text-sm font-bold flex items-center gap-2">
                                                <Icon name="Plus" className="text-emerald-500 w-4 h-4" /> Input Ronde
                                            </h2>
                                            <span className="text-[10px] font-black text-[#64748b] bg-slate-100 px-2 py-0.5 rounded ring-1 ring-slate-200">RONDE {rounds.length + 1}</span>
                                        </div>
                                        <div className="space-y-2 md:space-y-3">
                                            <div className="grid grid-cols-[1fr_80px_50px] gap-2 mb-2 px-1">
                                                <span className="text-[9px] uppercase font-bold text-[#64748b]">Nama</span>
                                                <span className="text-[9px] uppercase font-bold text-[#64748b] text-center">Skor</span>
                                                <span className="text-[9px] uppercase font-bold text-[#64748b] text-center">AS</span>
                                            </div>
                                            {players.map(player => (
                                                <div key={player.id} className="grid grid-cols-[1fr_80px_50px] gap-2 items-center min-h-[44px]">
                                                    <span className="text-xs md:text-sm font-semibold truncate pl-2 border-l-2" style={{ borderColor: player.color }}>{player.name}</span>
                                                    <input type="number" value={currentRoundInput[player.id]} onChange={(e) => handleScoreChange(player.id, e.target.value)} placeholder="0"
                                                        className="w-full px-2 py-2 border border-[#e2e8f0] rounded-lg text-sm text-center font-bold outline-none bg-slate-50 focus:bg-white transition-all focus:border-[#3b82f6]" />
                                                    <div className="flex justify-center">
                                                        <button onClick={() => setCurrentAsSekop(player.id)}
                                                            className={`w-9 h-9 md:w-8 md:h-8 rounded-full border-2 transition-all flex items-center justify-center ${currentAsSekop === player.id ? 'bg-[#1e293b] border-[#1e293b] text-white shadow-md' : 'border-[#e2e8f0] bg-white hover:border-[#1e293b]'}`}>
                                                            <span className="text-xs">{currentAsSekop === player.id ? '♠' : ''}</span>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={saveRound} className="w-full mt-6 py-4 bg-[#1e293b] text-white rounded-xl font-bold text-sm shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-[0.98] transition-all min-h-[48px]">
                                                Simpan Ronde {currentAsSekop ? '(+15 Bonus AS)' : ''}
                                            </button>
                                        </div>
                                    </section>

                                    {/* History Section */}
                                    <section className="col-span-12 md:col-span-7 bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-4 md:p-6 flex flex-col h-[450px] md:h-auto overflow-hidden shadow-sm">
                                        <div className="flex items-center justify-between mb-4">
                                            <h2 className="text-sm font-bold flex items-center gap-2"><Icon name="History" className="text-slate-400 w-4 h-4" /> Riwayat Permainan</h2>
                                        </div>
                                        <div className="flex-1 overflow-x-auto ring-1 ring-slate-100 rounded-lg custom-scrollbar">
                                            <table className="w-full border-collapse min-w-[500px]">
                                                <thead className="sticky top-0 bg-white z-10">
                                                    <tr className="border-b border-[#f1f5f9]">
                                                        <th className="text-left text-[9px] uppercase font-bold text-[#64748b] p-3 w-12">Rnd</th>
                                                        {players.map(p => <th key={p.id} className="text-center text-[9px] uppercase font-bold text-[#64748b] p-3 truncate max-w-[70px]">{p.name}</th>)}
                                                        <th className="w-10"></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {[...rounds].reverse().map((round, revIdx) => {
                                                        const idx = rounds.length - 1 - revIdx;
                                                        return (
                                                            <tr key={idx} className="group hover:bg-slate-50/80 transition-colors">
                                                                <td className="p-3 text-[10px] font-black text-[#64748b]">#{idx + 1}</td>
                                                                {players.map(player => (
                                                                    <td key={player.id} className="p-3 text-center">
                                                                        <div className="flex flex-col items-center">
                                                                            <span className={`text-sm font-bold tabular-nums ${round.scores[player.id] > 0 ? 'text-blue-600' : round.scores[player.id] < 0 ? 'text-rose-500' : ''}`}>
                                                                                {round.scores[player.id] > 0 ? '+' : ''}{round.scores[player.id]}
                                                                            </span>
                                                                            {round.asSekopPlayerId === player.id && <span className="text-[7px] font-black bg-rose-100 text-rose-700 px-1 py-0.5 rounded">♠ AS</span>}
                                                                        </div>
                                                                    </td>
                                                                ))}
                                                                <td className="p-3 text-right">
                                                                    <button onClick={() => deleteRound(idx)} className="p-2 text-slate-300 hover:text-rose-500 transition-all"><Icon name="Trash2" className="w-4 h-4" /></button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                            {rounds.length === 0 && (
                                                <div className="flex flex-col items-center justify-center h-48 text-slate-300 gap-2">
                                                    <Icon name="History" className="opacity-20 w-8 h-8" />
                                                    <span className="text-xs font-bold uppercase tracking-widest opacity-40 italic">Belum Ada Riwayat</span>
                                                </div>
                                            )}
                                        </div>
                                    </section>
                                </motion.div>
                            ) : (
                                <motion.div key="game-ended" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="col-span-12 grid grid-cols-1 md:grid-cols-12 gap-3 md:gap-4">
                                    {/* Leaderboard Section */}
                                    <section className="col-span-12 md:col-span-4 bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-5 md:p-6 flex flex-col shadow-sm">
                                        <div className="flex items-center gap-2 mb-6">
                                            <Icon name="Award" className="text-amber-500 w-5 h-5" />
                                            <h2 className="text-sm font-bold">Peringkat Akhir</h2>
                                        </div>
                                        <div className="space-y-3">
                                            {sortedPlayers.map((player, idx) => {
                                                const isLast = idx === sortedPlayers.length - 1;
                                                return (
                                                    <div key={player.id} className={`flex items-center gap-3 p-3 border rounded-xl transition-all ${idx === 0 ? 'bg-amber-50 border-amber-200 ring-2 ring-amber-100' : idx === 1 ? 'bg-slate-50 border-slate-200' : idx === 2 ? 'bg-orange-50 border-orange-200' : isLast ? 'bg-rose-50 border-rose-200 ring-1 ring-rose-100' : 'bg-[#f8fafc] border-[#e2e8f0]'}`}>
                                                        <div className={`w-8 h-8 rounded-full shadow-sm flex items-center justify-center font-black text-xs border ${idx === 0 ? 'bg-gradient-to-br from-amber-300 to-amber-500 text-white border-amber-600' : idx === 1 ? 'bg-gradient-to-br from-slate-200 to-slate-400 text-slate-700 border-slate-500' : idx === 2 ? 'bg-gradient-to-br from-orange-400 to-orange-700 text-white border-orange-800' : isLast ? 'bg-rose-500 text-white border-rose-600' : 'bg-white text-slate-500 border-[#e2e8f0]'}`}>
                                                            {idx + 1}
                                                        </div>
                                                        <div className="flex-1">
                                                            <span className={`text-sm font-bold ${isLast ? 'text-rose-700' : 'text-[#1e293b]'}`}>{player.name}</span>
                                                            <div className={`text-[9px] font-bold uppercase tracking-tighter ${isLast ? 'text-rose-400' : 'text-[#64748b]'}`}>
                                                                {idx === 0 ? 'Champion' : isLast ? 'Juru Kunci' : `Rank #${idx+1}`}
                                                            </div>
                                                        </div>
                                                        <div className={`text-lg font-black tabular-nums ${isLast ? 'text-rose-600' : 'text-[#1e293b]'}`}>{player.totalScore}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>

                                    {/* Chart Section */}
                                    <section className="col-span-12 md:col-span-8 bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-5 md:p-6 flex flex-col shadow-sm h-[400px] md:h-auto">
                                        <div className="flex items-center justify-between mb-6">
                                            <h2 className="text-sm font-bold flex items-center gap-2"><Icon name="TrendingUp" className="text-blue-500 w-5 h-5" /> Grafik Pergerakan</h2>
                                        </div>
                                        <RecapChart players={players} rounds={rounds} />
                                        <div className="flex justify-between border-t border-slate-50 pt-3">
                                            <span className="text-[9px] font-black text-[#64748b] uppercase">Start</span>
                                            <span className="text-[9px] font-black text-[#64748b] uppercase">Ronde {rounds.length}</span>
                                        </div>
                                    </section>

                                    {/* Summary Stats */}
                                    <div className="col-span-12 grid grid-cols-2 md:grid-cols-4 gap-3">
                                        <div className="bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-4 text-center shadow-sm">
                                            <span className="block text-[9px] font-bold text-[#64748b] uppercase tracking-widest mb-1">Total Ronde</span>
                                            <span className="text-xl md:text-2xl font-black">{rounds.length}</span>
                                        </div>
                                        <div className="bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-4 text-center shadow-sm">
                                            <span className="block text-[9px] font-bold text-[#64748b] uppercase tracking-widest mb-1">Top Score</span>
                                            <div className="flex flex-col items-center">
                                                <span className="text-xs font-bold text-[#3b82f6] truncate w-full px-2">{sortedPlayers[0].name}</span>
                                                <span className="text-xl md:text-2xl font-black tabular-nums">{sortedPlayers[0].totalScore}</span>
                                            </div>
                                        </div>
                                        <div className="bg-white border-[1.5px] border-[#e2e8f0] rounded-2xl p-4 text-center shadow-sm">
                                            <span className="block text-[9px] font-bold text-[#64748b] uppercase tracking-widest mb-1">Kolektor AS</span>
                                            {asSekopStats ? (
                                                <div className="flex flex-col items-center">
                                                    <span className="text-xs font-bold text-rose-500 truncate w-full px-2">{asSekopStats.name}</span>
                                                    <span className="text-xl md:text-2xl font-black tabular-nums">{asSekopStats.count} <span className="text-[10px] text-[#64748b] font-bold uppercase">Kali</span></span>
                                                </div>
                                            ) : <span className="text-xs font-bold text-[#64748b] italic">-</span>}
                                        </div>
                                        <div className="bg-rose-50 border border-rose-200 rounded-2xl p-4 text-center flex flex-col justify-center items-center shadow-sm">
                                            <span className="text-[8px] font-bold text-rose-400 uppercase tracking-widest mb-1">Juru Kunci</span>
                                            <span className="text-xs font-bold text-rose-700 truncate w-full px-2">{sortedPlayers[sortedPlayers.length - 1].name}</span>
                                            <span className="text-xl md:text-2xl font-black text-rose-600 mt-0.5 tabular-nums">{sortedPlayers[sortedPlayers.length - 1].totalScore}</span>
                                        </div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        <footer className="col-span-12 py-8 flex flex-col items-center gap-2 border-t border-[#e2e8f0] mt-6 opacity-40">
                            <div className="flex items-center gap-2 text-[9px] font-black tracking-[0.3em]">
